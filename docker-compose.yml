version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: government-feed-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  ollama:
    image: ollama/ollama:latest
    container_name: government-feed-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0

volumes:
  redis-data:
  ollama-data:
